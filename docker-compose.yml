version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: ticket-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ticket-network

  redis:
    image: redis:7-alpine
    container_name: ticket-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticket-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ticket-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ticket-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ticket-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - ticket-network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ticket-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-topics.sh"]
    volumes:
      - ./scripts/kafka/init-topics.sh:/init-topics.sh
    networks:
      - ticket-network

  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: user
    container_name: ticket-user-service
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      SERVICE_PORT: "8080"
      DB_DSN: root:rootpassword@tcp(mysql:3306)/user_db?parseTime=true
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ticket-network

  event-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: event
    container_name: ticket-event-service
    ports:
      - "8082:8080"
    env_file:
      - .env
    environment:
      SERVICE_PORT: "8080"
      DB_DSN: root:rootpassword@tcp(mysql:3306)/event_db?parseTime=true
      REDIS_ADDR: redis:6379
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ticket-network

  ticket-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: ticket
    container_name: ticket-ticket-service
    ports:
      - "8083:8080"
    env_file:
      - .env
    environment:
      SERVICE_PORT: "8080"
      DB_DSN: root:rootpassword@tcp(mysql:3306)/ticket_db?parseTime=true
      EVENT_DB_DSN: root:rootpassword@tcp(mysql:3306)/event_db?parseTime=true
      USER_DB_DSN: root:rootpassword@tcp(mysql:3306)/user_db?parseTime=true
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ticket-network

  email-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: email
    container_name: ticket-email-service
    ports:
      - "8084:8080"
    env_file:
      - .env
    environment:
      SERVICE_PORT: "8080"
      DB_DSN: root:rootpassword@tcp(mysql:3306)/email_db?parseTime=true
      USER_DB_DSN: root:rootpassword@tcp(mysql:3306)/user_db?parseTime=true
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ticket-network

volumes:
  mysql_data:

networks:
  ticket-network:
    driver: bridge
